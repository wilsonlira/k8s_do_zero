# =============================================================================
# kubeconfig - kube-proxy
# =============================================================================
# This kubeconfig file is used by kube-proxy on each worker node to
# authenticate to the kube-apiserver. kube-proxy watches for Service and
# Endpoint changes and translates them into iptables/IPVS rules on the node.
#
# Identity:
#   - CN: system:kube-proxy
#   - O: system:node-proxier
#   - The "system:kube-proxy" user is bound to the built-in ClusterRole
#     "system:node-proxier" via a ClusterRoleBinding, granting permissions
#     to read Services, Endpoints, and EndpointSlices.
#
# Certificate files referenced:
#   - CA certificate: /etc/kubernetes/pki/ca.pem
#   - Client certificate: /etc/kubernetes/pki/kube-proxy.pem
#   - Client key: /etc/kubernetes/pki/kube-proxy-key.pem
#
# Placeholder variables:
#   ${CONTROL_PLANE_IP} - The private IP address of the control plane node.
#                         Replace with the actual IP after provisioning.
#
# Note: Like the kubelet, kube-proxy runs on worker nodes and must connect
# to the API server via the control plane node's IP address.
#
# Target path on worker node: /var/lib/kubernetes/kubeconfig-kube-proxy.yaml
# =============================================================================
apiVersion: v1
kind: Config

# --------------------------------------------------------------------------
# clusters: Defines the Kubernetes API server endpoint and the CA certificate
# used to verify the server's TLS certificate.
# --------------------------------------------------------------------------
clusters:
  - cluster:
      # Path to the Certificate Authority certificate that signed the API
      # server's serving certificate. Used to verify the server identity.
      certificate-authority: /etc/kubernetes/pki/ca.pem
      # API server endpoint. kube-proxy runs on a worker node, so it must
      # connect to the control plane node's IP address (not localhost).
      # Replace ${CONTROL_PLANE_IP} with the actual control plane private IP.
      server: https://${CONTROL_PLANE_IP}:6443
    name: k8s-lab

# --------------------------------------------------------------------------
# users: Defines the client credentials used to authenticate to the API server.
# kube-proxy uses mutual TLS (mTLS) with its client certificate.
# --------------------------------------------------------------------------
users:
  - name: system:kube-proxy
    user:
      # Client certificate presented to the API server for authentication.
      # The CN in this certificate is "system:kube-proxy" and the O is
      # "system:node-proxier".
      client-certificate: /etc/kubernetes/pki/kube-proxy.pem
      # Private key corresponding to the client certificate.
      client-key: /etc/kubernetes/pki/kube-proxy-key.pem

# --------------------------------------------------------------------------
# contexts: Links a cluster definition with a user definition. This determines
# which credentials are used when communicating with which cluster.
# --------------------------------------------------------------------------
contexts:
  - context:
      cluster: k8s-lab
      user: system:kube-proxy
    name: default

# --------------------------------------------------------------------------
# current-context: Specifies which context to use by default when this
# kubeconfig is loaded by kube-proxy.
# --------------------------------------------------------------------------
current-context: default
