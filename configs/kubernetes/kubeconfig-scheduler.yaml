# =============================================================================
# kubeconfig - kube-scheduler
# =============================================================================
# This kubeconfig file is used by the kube-scheduler to authenticate to the
# kube-apiserver. The scheduler runs on the same node as the API server
# (control plane), so it connects via localhost (127.0.0.1:6443).
#
# Identity:
#   - CN: system:kube-scheduler
#   - This identity is bound to the built-in ClusterRole
#     "system:kube-scheduler" via a ClusterRoleBinding, granting permissions
#     to watch pods, nodes, and create binding objects for scheduling decisions.
#
# Certificate files referenced:
#   - CA certificate: /etc/kubernetes/pki/ca.pem
#   - Client certificate: /etc/kubernetes/pki/kube-scheduler.pem
#   - Client key: /etc/kubernetes/pki/kube-scheduler-key.pem
#
# Target path on control plane node: /etc/kubernetes/kubeconfig-scheduler.yaml
# =============================================================================
apiVersion: v1
kind: Config

# --------------------------------------------------------------------------
# clusters: Defines the Kubernetes API server endpoint and the CA certificate
# used to verify the server's TLS certificate.
# --------------------------------------------------------------------------
clusters:
  - cluster:
      # Path to the Certificate Authority certificate that signed the API
      # server's serving certificate. Used to verify the server identity.
      certificate-authority: /etc/kubernetes/pki/ca.pem
      # API server endpoint. Since the scheduler runs on the same node as
      # the API server, we use the loopback address (127.0.0.1).
      server: https://127.0.0.1:6443
    name: k8s-lab

# --------------------------------------------------------------------------
# users: Defines the client credentials used to authenticate to the API server.
# The scheduler uses mutual TLS (mTLS) with its client certificate.
# --------------------------------------------------------------------------
users:
  - name: system:kube-scheduler
    user:
      # Client certificate presented to the API server for authentication.
      # The CN in this certificate is "system:kube-scheduler".
      client-certificate: /etc/kubernetes/pki/kube-scheduler.pem
      # Private key corresponding to the client certificate.
      client-key: /etc/kubernetes/pki/kube-scheduler-key.pem

# --------------------------------------------------------------------------
# contexts: Links a cluster definition with a user definition. This determines
# which credentials are used when communicating with which cluster.
# --------------------------------------------------------------------------
contexts:
  - context:
      cluster: k8s-lab
      user: system:kube-scheduler
    name: default

# --------------------------------------------------------------------------
# current-context: Specifies which context to use by default when this
# kubeconfig is loaded by the scheduler.
# --------------------------------------------------------------------------
current-context: default
