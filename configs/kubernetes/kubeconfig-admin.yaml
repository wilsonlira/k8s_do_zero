# =============================================================================
# kubeconfig - admin (cluster administrator)
# =============================================================================
# This kubeconfig file is used by cluster administrators to interact with the
# Kubernetes API server via kubectl. The admin user has full cluster access
# through the "system:masters" group.
#
# Identity:
#   - CN: admin
#   - O: system:masters
#   - The "system:masters" group is automatically bound to the built-in
#     ClusterRole "cluster-admin", granting unrestricted access to all
#     resources in the cluster.
#
# Certificate files referenced:
#   - CA certificate: /etc/kubernetes/pki/ca.pem
#   - Client certificate: /etc/kubernetes/pki/admin.pem
#   - Client key: /etc/kubernetes/pki/admin-key.pem
#
# Usage:
#   kubectl --kubeconfig=/etc/kubernetes/kubeconfig-admin.yaml get nodes
#   Or copy to ~/.kube/config for default kubectl access.
#
# Target path on control plane node: /etc/kubernetes/kubeconfig-admin.yaml
# =============================================================================
apiVersion: v1
kind: Config

# --------------------------------------------------------------------------
# clusters: Defines the Kubernetes API server endpoint and the CA certificate
# used to verify the server's TLS certificate.
# --------------------------------------------------------------------------
clusters:
  - cluster:
      # Path to the Certificate Authority certificate that signed the API
      # server's serving certificate. Used to verify the server identity.
      certificate-authority: /etc/kubernetes/pki/ca.pem
      # API server endpoint. For admin access from the control plane node,
      # we use the loopback address. If accessing remotely, replace with
      # the control plane node's public/private IP address.
      server: https://127.0.0.1:6443
    name: k8s-lab

# --------------------------------------------------------------------------
# users: Defines the client credentials used to authenticate to the API server.
# The admin user uses mutual TLS (mTLS) with its client certificate.
# --------------------------------------------------------------------------
users:
  - name: admin
    user:
      # Client certificate presented to the API server for authentication.
      # The CN is "admin" and the O is "system:masters", which grants
      # cluster-admin privileges via the built-in ClusterRoleBinding.
      client-certificate: /etc/kubernetes/pki/admin.pem
      # Private key corresponding to the client certificate.
      client-key: /etc/kubernetes/pki/admin-key.pem

# --------------------------------------------------------------------------
# contexts: Links a cluster definition with a user definition. This determines
# which credentials are used when communicating with which cluster.
# --------------------------------------------------------------------------
contexts:
  - context:
      cluster: k8s-lab
      user: admin
    name: default

# --------------------------------------------------------------------------
# current-context: Specifies which context to use by default when this
# kubeconfig is loaded by kubectl.
# --------------------------------------------------------------------------
current-context: default
