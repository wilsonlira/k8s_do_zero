# =============================================================================
# kubeconfig - kubelet (worker node agent)
# =============================================================================
# This kubeconfig file is used by the kubelet on each worker node to
# authenticate to the kube-apiserver. The kubelet registers the node and
# reports its status to the control plane.
#
# Identity:
#   - CN: system:node:<nodeName>
#   - O: system:nodes
#   - The "system:nodes" group is used by the Node authorizer to grant
#     kubelet permissions to read Secrets, ConfigMaps, PVCs, and PVs
#     bound to pods scheduled on this node.
#
# Certificate files referenced:
#   - CA certificate: /etc/kubernetes/pki/ca.pem
#   - Client certificate: /etc/kubernetes/pki/kubelet.pem
#   - Client key: /etc/kubernetes/pki/kubelet-key.pem
#
# Placeholder variables:
#   ${CONTROL_PLANE_IP} - The private IP address of the control plane node.
#                         Replace with the actual IP after provisioning.
#
# Note: Unlike control plane components that connect via localhost (127.0.0.1),
# the kubelet runs on a separate worker node and must connect to the API server
# via the control plane node's IP address.
#
# Target path on worker node: /var/lib/kubernetes/kubeconfig-kubelet.yaml
# =============================================================================
apiVersion: v1
kind: Config

# --------------------------------------------------------------------------
# clusters: Defines the Kubernetes API server endpoint and the CA certificate
# used to verify the server's TLS certificate.
# --------------------------------------------------------------------------
clusters:
  - cluster:
      # Path to the Certificate Authority certificate that signed the API
      # server's serving certificate. Used to verify the server identity.
      certificate-authority: /etc/kubernetes/pki/ca.pem
      # API server endpoint. The kubelet runs on a worker node, so it must
      # connect to the control plane node's IP address (not localhost).
      # Replace ${CONTROL_PLANE_IP} with the actual control plane private IP.
      server: https://${CONTROL_PLANE_IP}:6443
    name: k8s-lab

# --------------------------------------------------------------------------
# users: Defines the client credentials used to authenticate to the API server.
# The kubelet uses mutual TLS (mTLS) with its client certificate.
# The CN must be "system:node:<nodeName>" for the Node authorizer to work.
# --------------------------------------------------------------------------
users:
  - name: system:node:${HOSTNAME}
    user:
      # Client certificate presented to the API server for authentication.
      # The CN in this certificate is "system:node:<nodeName>" and the O is
      # "system:nodes", which enables the Node authorization mode.
      client-certificate: /etc/kubernetes/pki/kubelet.pem
      # Private key corresponding to the client certificate.
      client-key: /etc/kubernetes/pki/kubelet-key.pem

# --------------------------------------------------------------------------
# contexts: Links a cluster definition with a user definition. This determines
# which credentials are used when communicating with which cluster.
# --------------------------------------------------------------------------
contexts:
  - context:
      cluster: k8s-lab
      user: system:node:${HOSTNAME}
    name: default

# --------------------------------------------------------------------------
# current-context: Specifies which context to use by default when this
# kubeconfig is loaded by the kubelet.
# --------------------------------------------------------------------------
current-context: default
