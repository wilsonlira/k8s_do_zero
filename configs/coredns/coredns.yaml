# =============================================================================
# CoreDNS - Kubernetes Cluster DNS Manifest
# =============================================================================
# This manifest deploys CoreDNS as the cluster DNS provider. CoreDNS provides:
#   - Service discovery via DNS (resolves Service names to ClusterIPs)
#   - Pod DNS records (IP-based reverse lookups)
#   - Cross-namespace DNS resolution
#   - External DNS forwarding (for non-cluster domains)
#
# DNS naming convention:
#   - Services: <service>.<namespace>.svc.cluster.local
#   - Pods: <pod-ip-dashed>.<namespace>.pod.cluster.local
#   - SRV records: _<port-name>._<protocol>.<service>.<namespace>.svc.cluster.local
#
# Configuration:
#   - Deployed as a Deployment with 2 replicas for high availability
#   - Exposed via a Service with ClusterIP 10.96.0.10 (CLUSTER_DNS)
#   - The kubelet is configured to use this IP as the DNS resolver for all pods
#
# Corefile plugins:
#   - kubernetes: Serves DNS records for Kubernetes Services and Pods
#   - forward: Forwards non-cluster queries to upstream DNS (e.g., 8.8.8.8)
#   - cache: Caches DNS responses to reduce load on upstream servers
#   - errors: Logs DNS errors to stdout
#   - health: Exposes /health endpoint on port 8080 for liveness probes
#   - ready: Exposes /ready endpoint on port 8181 for readiness probes
#   - loop: Detects and breaks DNS forwarding loops
#   - reload: Allows Corefile changes without restarting CoreDNS
#   - loadbalance: Randomizes A/AAAA record order for round-robin DNS
#
# Installation:
#   kubectl apply -f coredns.yaml
#
# Verification:
#   kubectl get pods -n kube-system -l k8s-app=kube-dns
#   kubectl get svc -n kube-system kube-dns
#   kubectl run test-dns --image=busybox:1.36 --rm -it --restart=Never -- \
#     nslookup kubernetes.default.svc.cluster.local
#
# Requirements: 10.2
# =============================================================================
---
# =============================================================================
# ServiceAccount: coredns
# =============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: coredns
  namespace: kube-system
  labels:
    k8s-app: kube-dns

---
# =============================================================================
# ClusterRole: system:coredns
# =============================================================================
# Permissions required by CoreDNS to watch Services, Endpoints, Namespaces,
# and Pods for DNS record generation.
# =============================================================================
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: system:coredns
  labels:
    k8s-app: kube-dns
rules:
  - apiGroups: [""]
    resources: ["endpoints", "services", "pods", "namespaces"]
    verbs: ["list", "watch"]
  - apiGroups: ["discovery.k8s.io"]
    resources: ["endpointslices"]
    verbs: ["list", "watch"]

---
# =============================================================================
# ClusterRoleBinding: system:coredns
# =============================================================================
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: system:coredns
  labels:
    k8s-app: kube-dns
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:coredns
subjects:
  - kind: ServiceAccount
    name: coredns
    namespace: kube-system

---
# =============================================================================
# ConfigMap: coredns (Corefile)
# =============================================================================
# The Corefile is CoreDNS's configuration file. It defines how DNS queries
# are handled using a plugin chain architecture.
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: coredns
  namespace: kube-system
  labels:
    k8s-app: kube-dns
data:
  Corefile: |
    # =========================================================================
    # Zone: cluster.local
    # =========================================================================
    # Handles all DNS queries for the cluster domain (*.cluster.local).
    # This includes Service and Pod DNS records.
    # =========================================================================
    .:53 {
        # errors: Log DNS errors to stdout for debugging
        errors

        # health: Exposes a health check endpoint on port 8080.
        # Used by the liveness probe to determine if CoreDNS is running.
        # Endpoint: http://localhost:8080/health
        health {
            lameduck 5s
        }

        # ready: Exposes a readiness endpoint on port 8181.
        # Returns 200 OK when all plugins that implement readiness are ready.
        # Endpoint: http://localhost:8181/ready
        ready

        # kubernetes: The core plugin that serves DNS for Kubernetes resources.
        # - pods insecure: Enables A records for pods (pod-ip.namespace.pod.cluster.local)
        # - fallthrough in-addr.arpa ip6.arpa: Falls through to next plugin for
        #   reverse lookups not found in Kubernetes
        # - ttl 30: Sets the TTL for DNS responses to 30 seconds
        kubernetes cluster.local in-addr.arpa ip6.arpa {
            pods insecure
            fallthrough in-addr.arpa ip6.arpa
            ttl 30
        }

        # prometheus: Exposes Prometheus metrics on port 9153
        # Endpoint: http://localhost:9153/metrics
        prometheus :9153

        # forward: Forwards queries not matching cluster.local to upstream DNS.
        # Uses /etc/resolv.conf from the node (which typically points to
        # the VPC DNS resolver in AWS, e.g., 10.0.0.2).
        forward . /etc/resolv.conf {
            max_concurrent 1000
        }

        # cache: Caches DNS responses for 30 seconds.
        # Reduces load on the Kubernetes API and upstream DNS servers.
        cache 30

        # loop: Detects forwarding loops and halts the server if detected.
        # Prevents infinite DNS query loops between CoreDNS and upstream.
        loop

        # reload: Allows the Corefile to be reloaded without restarting CoreDNS.
        # Checks for changes every 2 minutes by default.
        reload

        # loadbalance: Randomizes the order of A/AAAA records in responses.
        # Provides basic round-robin DNS load balancing for Services with
        # multiple endpoints.
        loadbalance
    }

---
# =============================================================================
# Deployment: coredns
# =============================================================================
# Deploys CoreDNS with 2 replicas for high availability. If one pod fails,
# the other continues serving DNS queries without interruption.
#
# Anti-affinity ensures replicas are scheduled on different nodes when possible.
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: coredns
  namespace: kube-system
  labels:
    k8s-app: kube-dns
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      k8s-app: kube-dns
  template:
    metadata:
      labels:
        k8s-app: kube-dns
    spec:
      serviceAccountName: coredns
      priorityClassName: system-cluster-critical
      tolerations:
        - key: CriticalAddonsOnly
          operator: Exists
        - key: node-role.kubernetes.io/control-plane
          effect: NoSchedule
      nodeSelector:
        kubernetes.io/os: linux
      # Prefer spreading replicas across different nodes
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: k8s-app
                      operator: In
                      values: ["kube-dns"]
                topologyKey: kubernetes.io/hostname
      containers:
        - name: coredns
          image: registry.k8s.io/coredns/coredns:v1.11.1
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              cpu: 100m
              memory: 70Mi
            limits:
              cpu: 200m
              memory: 170Mi
          args: ["-conf", "/etc/coredns/Corefile"]
          volumeMounts:
            - name: config-volume
              mountPath: /etc/coredns
              readOnly: true
          ports:
            - containerPort: 53
              name: dns
              protocol: UDP
            - containerPort: 53
              name: dns-tcp
              protocol: TCP
            - containerPort: 9153
              name: metrics
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              add: ["NET_BIND_SERVICE"]
              drop: ["all"]
            readOnlyRootFilesystem: true
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /ready
              port: 8181
              scheme: HTTP
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3
      # Use node's DNS for upstream resolution
      dnsPolicy: Default
      volumes:
        - name: config-volume
          configMap:
            name: coredns
            items:
              - key: Corefile
                path: Corefile

---
# =============================================================================
# Service: kube-dns
# =============================================================================
# Exposes CoreDNS as a ClusterIP service. The ClusterIP (10.96.0.10) is
# configured in the kubelet as the --cluster-dns parameter, so all pods
# automatically use this service for DNS resolution.
#
# The service name "kube-dns" is a Kubernetes convention — kubelet expects
# this name regardless of the actual DNS implementation (CoreDNS, kube-dns).
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: kube-dns
  namespace: kube-system
  labels:
    k8s-app: kube-dns
  annotations:
    prometheus.io/port: "9153"
    prometheus.io/scrape: "true"
spec:
  selector:
    k8s-app: kube-dns
  # Fixed ClusterIP that matches the kubelet --cluster-dns configuration.
  # This IP must be within the SERVICE_CIDR range (10.96.0.0/12).
  clusterIP: 10.96.0.10
  ports:
    - name: dns
      port: 53
      targetPort: 53
      protocol: UDP
    - name: dns-tcp
      port: 53
      targetPort: 53
      protocol: TCP
    - name: metrics
      port: 9153
      targetPort: 9153
      protocol: TCP
